name: Gradle Build
on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

# Grant GitHub Actions only READ access to the repo
permissions:
  contents: read

jobs:
  gradle:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6
      - name: Set up JDK 11
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 11
      - name: Run chmod to make gradlew executable
        run: chmod +x ./gradlew
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: 8.10

      - name: Execute Gradle build
        run: ./gradlew build
